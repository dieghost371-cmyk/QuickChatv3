<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>QuickChat</title>
<meta name="theme-color" content="#0b141a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230b141a%22/><path d=%22M50 18c-17 0-30 12-30 28 0 9 4 17 12 22l-3 14 15-8c2 .3 4 .4 6 .4 17 0 30-12 30-28S67 18 50 18z%22 fill=%22%2300d9a3%22/></svg>">
<style>
:root{
  --bg-app:#0b141a;
  --bg-panel:#111b21;
  --bg-panel-header:#1f2c34;
  --bg-elevated:#202c33;
  --bg-input:#2a3942;
  --bg-hover:#202c33;
  --accent:#00d9a3;
  --accent-dim:#00a37a;
  --accent-deep:#005c4b;
  --bubble-out:#005c4b;
  --bubble-in:#1f2c34;
  --text-primary:#e9edef;
  --text-secondary:#8696a0;
  --text-tertiary:#667781;
  --border:#222d34;
  --danger:#ff5c5c;
  --warn:#ffb454;
  --online:#00d9a3;
  --shadow-lg:0 8px 28px rgba(0,0,0,.45);
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg-app);
  color:var(--text-primary);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
#app{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  max-width:560px;
  margin:0 auto;
  background:var(--bg-app);
  box-shadow:var(--shadow-lg);
}
@media (min-width:561px){
  body{background:#05080a;display:flex;align-items:center;justify-content:center;}
  #app{height:94vh;max-height:920px;border-radius:24px;overflow:hidden;border:1px solid #1a242a;}
}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#2a3942;border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}
button{font-family:inherit;}
input,textarea{font-family:inherit;}
a{color:inherit;}
.hidden{display:none !important;}
.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  background:var(--bg-app);
  animation:screenIn .22s ease;
}
@keyframes screenIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.screen-stack{position:relative;flex:1;overflow:hidden;}

/* ---------- Splash ---------- */
#splashScreen{align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,#0f1d1a,#0b141a 70%);}
.splash-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;}
.splash-mark{
  width:96px;height:96px;border-radius:28px;
  background:linear-gradient(145deg,var(--accent),var(--accent-deep));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 1px rgba(0,217,163,.25),0 20px 50px rgba(0,217,163,.25);
  animation:pulseLogo 2.2s ease-in-out infinite;
}
@keyframes pulseLogo{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.splash-mark svg{width:52px;height:52px;}
.splash-title{font-size:26px;font-weight:800;letter-spacing:3px;color:var(--text-primary);}
.splash-sub{font-size:12.5px;color:var(--text-secondary);letter-spacing:1px;}
.splash-loader{width:120px;height:3px;border-radius:3px;background:#1c2a30;overflow:hidden;margin-top:8px;}
.splash-loader::after{content:"";display:block;height:100%;width:40%;background:var(--accent);border-radius:3px;animation:loadBar 1.1s ease-in-out infinite;}
@keyframes loadBar{0%{transform:translateX(-100%);}100%{transform:translateX(350%);}}
.splash-credit{position:absolute;bottom:calc(24px + var(--safe-bottom));font-size:11px;color:var(--text-tertiary);letter-spacing:.5px;}

/* ---------- Auth ---------- */
.auth-screen{padding:0 28px;justify-content:center;align-items:stretch;}
.auth-top{display:flex;flex-direction:column;align-items:center;margin-bottom:36px;}
.auth-mark{width:64px;height:64px;border-radius:18px;background:linear-gradient(145deg,var(--accent),var(--accent-deep));display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 12px 30px rgba(0,217,163,.22);}
.auth-mark svg{width:34px;height:34px;}
.auth-heading{font-size:21px;font-weight:700;margin:0 0 6px;text-align:center;}
.auth-subtext{font-size:13.5px;color:var(--text-secondary);text-align:center;line-height:1.5;max-width:320px;}
.field-group{margin-bottom:18px;}
.field-label{font-size:12px;color:var(--text-secondary);margin-bottom:8px;display:block;letter-spacing:.3px;}
.phone-input-row{display:flex;gap:8px;}
.country-code{
  width:78px;flex-shrink:0;background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);padding:14px 8px;text-align:center;font-size:15px;
}
.text-input{
  flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-primary);padding:14px 14px;font-size:15.5px;outline:none;transition:border-color .15s;
  width:100%;
}
.text-input:focus{border-color:var(--accent);}
.text-input::placeholder{color:var(--text-tertiary);}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-dim));
  color:#04231b;border:none;border-radius:var(--radius-sm);padding:15px;font-size:15.5px;font-weight:700;
  cursor:pointer;width:100%;transition:transform .12s,opacity .12s;letter-spacing:.2px;
}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-ghost{
  background:transparent;color:var(--accent);border:none;padding:12px;font-size:14px;font-weight:600;
  cursor:pointer;width:100%;
}
.otp-boxes{display:flex;gap:10px;justify-content:center;margin-bottom:22px;}
.otp-box{
  width:46px;height:54px;text-align:center;font-size:22px;font-weight:700;
  background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);outline:none;
}
.otp-box:focus{border-color:var(--accent);}
.auth-footnote{font-size:11.5px;color:var(--text-tertiary);text-align:center;margin-top:18px;line-height:1.6;}
#recaptcha-container{display:flex;justify-content:center;margin:10px 0;}
.auth-error{color:var(--danger);font-size:12.5px;text-align:center;margin-top:10px;min-height:16px;}
.profile-setup-avatar{
  width:104px;height:104px;border-radius:50%;margin:0 auto 18px;position:relative;
  background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:2px solid var(--border);
}
.profile-setup-avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit-badge{
  position:absolute;bottom:0;right:0;width:32px;height:32px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;border:3px solid var(--bg-app);cursor:pointer;
}

/* ---------- Top App Header ---------- */
.app-header{
  padding-top:calc(10px + var(--safe-top));
  background:var(--bg-panel-header);
  flex-shrink:0;
}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 12px;}
.header-logo{display:flex;align-items:center;gap:10px;}
.header-logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--accent),var(--accent-deep));display:flex;align-items:center;justify-content:center;}
.header-logo-mark svg{width:19px;height:19px;}
.header-logo-text{font-size:19px;font-weight:800;letter-spacing:1px;}
.header-icons{display:flex;gap:6px;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:none;background:transparent;color:var(--text-secondary);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;
}
.icon-btn:active{background:rgba(255,255,255,.08);}
.icon-btn svg{width:21px;height:21px;}
.search-bar{
  margin:0 14px 12px;background:var(--bg-input);border-radius:24px;display:flex;align-items:center;gap:10px;
  padding:9px 14px;
}
.search-bar svg{width:17px;height:17px;color:var(--text-secondary);flex-shrink:0;}
.search-bar input{
  background:none;border:none;outline:none;color:var(--text-primary);font-size:14.5px;width:100%;
}
.search-bar input::placeholder{color:var(--text-tertiary);}

/* ---------- Sub header (chat window, settings) ---------- */
.sub-header{
  padding-top:calc(10px + var(--safe-top));
  background:var(--bg-panel-header);flex-shrink:0;
  display:flex;align-items:center;gap:8px;padding-left:8px;padding-right:8px;padding-bottom:10px;
}
.sub-header-title{font-size:18px;font-weight:700;flex:1;}
.back-btn{width:38px;height:38px;border:none;background:transparent;color:var(--text-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.back-btn:active{background:rgba(255,255,255,.08);}
.back-btn svg{width:22px;height:22px;}

/* ---------- Body / scroll area ---------- */
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ---------- Chat list ---------- */
.chat-item{
  display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background .12s;
  position:relative;
}
.chat-item:active{background:var(--bg-hover);}
.avatar{
  width:50px;height:50px;border-radius:50%;background:var(--bg-elevated);flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--text-secondary);font-weight:700;font-size:18px;
}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-status-dot{
  position:absolute;bottom:0px;right:0px;width:13px;height:13px;border-radius:50%;background:var(--online);
  border:2.5px solid var(--bg-app);
}
.avatar-lg{width:84px;height:84px;font-size:30px;}
.chat-item-body{flex:1;min-width:0;border-bottom:1px solid var(--border);padding-bottom:11px;display:flex;flex-direction:column;gap:3px;}
.chat-item-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.chat-item-name{font-size:15.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-item-time{font-size:11.5px;color:var(--text-tertiary);flex-shrink:0;}
.chat-item-time.unread-time{color:var(--accent);font-weight:700;}
.chat-item-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.chat-item-preview{font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.chat-item-preview .ticks{flex-shrink:0;}
.unread-badge{
  background:var(--accent);color:#04231b;font-size:11px;font-weight:800;min-width:19px;height:19px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;
}
.muted-icon{color:var(--text-tertiary);flex-shrink:0;}

/* ---------- Empty states ---------- */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:14px;}
.empty-state-icon{width:72px;height:72px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);}
.empty-state-icon svg{width:34px;height:34px;}
.empty-state-title{font-size:15.5px;font-weight:700;}
.empty-state-text{font-size:13px;color:var(--text-secondary);line-height:1.6;max-width:260px;}

/* ---------- FAB ---------- */
.fab{
  position:absolute;right:18px;bottom:calc(82px + var(--safe-bottom));width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-dim));border:none;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(0,217,163,.35);cursor:pointer;color:#04231b;z-index:5;transition:transform .12s;
}
.fab:active{transform:scale(.93);}
.fab svg{width:25px;height:25px;}

/* ---------- Bottom Nav ---------- */
.bottom-nav{
  display:flex;background:var(--bg-panel-header);border-top:1px solid var(--border);flex-shrink:0;
  padding-bottom:var(--safe-bottom);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 8px;background:none;border:none;
  color:var(--text-tertiary);cursor:pointer;position:relative;
}
.nav-item svg{width:23px;height:23px;}
.nav-item span{font-size:10.5px;font-weight:600;}
.nav-item.active{color:var(--accent);}
.nav-badge{
  position:absolute;top:3px;right:calc(50% - 20px);background:var(--accent);color:#04231b;font-size:9.5px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;
}

/* ---------- New chat / contacts list ---------- */
.section-label{padding:14px 16px 6px;font-size:12.5px;color:var(--accent);font-weight:700;letter-spacing:.4px;}
.contact-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;}
.contact-item:active{background:var(--bg-hover);}
.contact-name{font-size:15px;font-weight:600;}
.contact-sub{font-size:12.5px;color:var(--text-secondary);}
.action-row{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;}
.action-icon-circle{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#04231b;flex-shrink:0;}
.action-icon-circle svg{width:21px;height:21px;}

/* ---------- Chat window ---------- */
.chat-window-header{display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;}
.chat-window-name{font-size:15.5px;font-weight:700;line-height:1.2;}
.chat-window-status{font-size:12px;color:var(--text-secondary);line-height:1.2;}
.chat-window-status.online{color:var(--accent);}
.messages-area{
  flex:1;overflow-y:auto;padding:14px 10px 10px;-webkit-overflow-scrolling:touch;
  background-color:var(--bg-app);
  background-image:
    radial-gradient(circle at 15% 20%, rgba(0,217,163,.025) 0, transparent 45%),
    radial-gradient(circle at 85% 75%, rgba(0,217,163,.02) 0, transparent 45%);
  display:flex;flex-direction:column;gap:2px;
}
.date-chip-wrap{display:flex;justify-content:center;margin:10px 0;}
.date-chip{background:var(--bg-elevated);color:var(--text-secondary);font-size:11.5px;padding:5px 12px;border-radius:8px;font-weight:600;}
.msg-row{display:flex;margin:2px 6px;max-width:100%;}
.msg-row.out{justify-content:flex-end;}
.msg-row.in{justify-content:flex-start;}
.msg-bubble{
  max-width:78%;padding:7px 9px 7px 10px;border-radius:var(--radius-md);position:relative;font-size:14.5px;
  line-height:1.4;box-shadow:0 1px 1px rgba(0,0,0,.2);word-wrap:break-word;
}
.msg-row.out .msg-bubble{background:var(--bubble-out);border-top-right-radius:3px;color:#e9faf4;}
.msg-row.in .msg-bubble{background:var(--bubble-in);border-top-left-radius:3px;}
.msg-bubble.deleted{font-style:italic;color:var(--text-tertiary);display:flex;align-items:center;gap:5px;}
.msg-img{max-width:240px;border-radius:10px;display:block;margin-bottom:4px;cursor:pointer;}
.msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px;float:right;margin-left:8px;}
.msg-time{font-size:10.5px;color:rgba(233,237,239,.55);}
.msg-row.in .msg-time{color:var(--text-tertiary);}
.ticks svg{width:15px;height:15px;}
.tick-sent{color:var(--text-tertiary);}
.tick-read{color:#53bdeb;}
.msg-text-content{white-space:pre-wrap;}
.typing-row{display:flex;align-items:center;gap:4px;padding:8px 12px;margin:2px 6px;background:var(--bubble-in);border-radius:var(--radius-md);border-top-left-radius:3px;width:fit-content;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-secondary);animation:typingBounce 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.15s;}
.typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-4px);opacity:1;}}

.composer{display:flex;align-items:flex-end;gap:8px;padding:8px 10px;background:var(--bg-panel-header);padding-bottom:calc(8px + var(--safe-bottom));flex-shrink:0;}
.composer-input-wrap{
  flex:1;background:var(--bg-input);border-radius:22px;display:flex;align-items:flex-end;padding:6px 6px 6px 14px;gap:6px;
}
.composer-textarea{
  flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:14.5px;resize:none;
  max-height:100px;line-height:1.4;padding:7px 0;
}
.composer-textarea::placeholder{color:var(--text-tertiary);}
.composer-icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.composer-icon-btn svg{width:20px;height:20px;}
.send-btn{
  width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dim));
  border:none;display:flex;align-items:center;justify-content:center;color:#04231b;cursor:pointer;flex-shrink:0;
  transition:transform .12s;
}
.send-btn:active{transform:scale(.92);}
.send-btn svg{width:20px;height:20px;}

.emoji-panel{
  background:var(--bg-panel-header);border-top:1px solid var(--border);max-height:220px;overflow-y:auto;
  display:flex;flex-wrap:wrap;padding:10px;gap:2px;flex-shrink:0;
}
.emoji-panel span{font-size:23px;padding:6px;cursor:pointer;border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.emoji-panel span:active{background:var(--bg-hover);}

/* message context menu */
.ctx-overlay{position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.3);}
.ctx-menu{
  position:absolute;background:var(--bg-elevated);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);
  min-width:180px;overflow:hidden;z-index:31;border:1px solid var(--border);
}
.ctx-menu-item{padding:13px 16px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.ctx-menu-item:active{background:var(--bg-hover);}
.ctx-menu-item.danger{color:var(--danger);}

/* ---------- Profile / Settings ---------- */
.profile-banner{display:flex;flex-direction:column;align-items:center;padding:26px 20px;background:var(--bg-panel-header);position:relative;}
.profile-banner-name{font-size:19px;font-weight:700;margin-top:14px;}
.profile-banner-phone{font-size:13px;color:var(--text-secondary);margin-top:3px;}
.settings-section{margin-top:10px;}
.settings-row{display:flex;align-items:center;gap:16px;padding:14px 18px;cursor:pointer;}
.settings-row:active{background:var(--bg-hover);}
.settings-row-icon{width:24px;height:24px;color:var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.settings-row-icon svg{width:22px;height:22px;}
.settings-row-body{flex:1;}
.settings-row-title{font-size:15px;font-weight:600;}
.settings-row-sub{font-size:12.5px;color:var(--text-secondary);margin-top:2px;}
.settings-row-chevron{color:var(--text-tertiary);}
.settings-row-chevron svg{width:18px;height:18px;}
.settings-divider{height:8px;background:var(--bg-panel);}
.toggle-switch{width:44px;height:26px;border-radius:14px;background:var(--bg-input);position:relative;cursor:pointer;flex-shrink:0;transition:background .15s;}
.toggle-switch.on{background:var(--accent);}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.toggle-switch.on .toggle-knob{transform:translateX(18px);}
.logout-btn{margin:24px 18px;color:var(--danger);text-align:center;font-weight:700;font-size:15px;padding:14px;cursor:pointer;background:var(--bg-elevated);border-radius:var(--radius-sm);}
.logout-btn:active{opacity:.7;}

/* ---------- About modal ---------- */
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:40;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-card{background:var(--bg-elevated);border-radius:var(--radius-lg);padding:26px 22px;max-width:340px;width:100%;text-align:center;border:1px solid var(--border);}
.modal-card .auth-mark{margin:0 auto 16px;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.modal-line{font-size:13.5px;color:var(--text-secondary);margin:3px 0;}
.modal-contact{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.modal-contact-num{font-size:14px;font-weight:700;color:var(--accent);margin:5px 0;}
.modal-close{margin-top:18px;background:var(--accent);color:#04231b;border:none;border-radius:var(--radius-sm);padding:12px;width:100%;font-weight:700;font-size:14.5px;cursor:pointer;}

/* generic toast */
.toast{
  position:absolute;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  background:var(--bg-elevated);color:var(--text-primary);padding:11px 18px;border-radius:24px;font-size:13.5px;
  box-shadow:var(--shadow-lg);z-index:60;white-space:nowrap;border:1px solid var(--border);
}

/* simple list rows for calls/contacts icons */
.call-type-icon{width:16px;height:16px;}
.call-type-icon.missed{color:var(--danger);}
.call-type-icon.ok{color:var(--accent);}

/* image viewer */
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:flex;align-items:center;justify-content:center;}
.img-viewer img{max-width:92%;max-height:80%;border-radius:8px;}
.img-viewer-close{position:absolute;top:calc(20px + var(--safe-top));right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* image upload preview before send */
.attach-preview-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-panel-header);border-top:1px solid var(--border);}
.attach-preview-bar img{width:48px;height:48px;border-radius:8px;object-fit:cover;}
.attach-preview-bar .attach-info{flex:1;font-size:12.5px;color:var(--text-secondary);}
.attach-cancel{color:var(--danger);font-size:13px;font-weight:700;cursor:pointer;padding:6px 10px;}

.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#04231b;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-light{border:2.5px solid rgba(255,255,255,.15);border-top-color:var(--accent);}

.user-search-empty{padding:30px 24px;text-align:center;color:var(--text-secondary);font-size:13.5px;line-height:1.6;}

textarea.text-input{resize:none;min-height:80px;}
.char-count{font-size:11px;color:var(--text-tertiary);text-align:right;margin-top:4px;}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
